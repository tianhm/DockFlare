<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - DockFlare Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-base-200 min-h-screen flex items-center justify-center p-4">
    <div class="card w-full max-w-lg bg-base-100 shadow-xl">
        <div class="card-body">
            <div class="text-center mb-6">
                <img src="{{ url_for('static', filename='images/logo.gif') }}" alt="DockFlare Logo" class="h-16 mx-auto">
                <h1 class="text-2xl font-bold mt-4">{{ title }}</h1>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="space-y-2 mb-4">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category in ['success', 'error', 'warning', 'info'] else 'info' }} shadow-lg">
                            <div>
                                <span>{{ message }}</span>
                            </div>
                        </div>
                    {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            {% block setup_content %}{% endblock %}

            <div class="mt-6">
                {% block step_indicator %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
